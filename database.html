<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publiskā datubāze</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        .db-container { padding: 50px 10%; }
        .filter-group { margin: 20px 0; display: flex; gap: 10px; }
        .active-filter { background-color: #007bff !important; color: white !important; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .data-table thead tr { background-color: #051c2c; color: white; text-align: left; }
        .data-table th, .data-table td { padding: 15px; border-bottom: 1px solid #ddd; font-size: 14px; }
        .data-table tbody tr:hover { background-color: #f5f5f5; }
        .back-link { text-decoration: none; color: #0c3f75; font-weight: bold; }
    </style>
</head>

<body>
    <div class="db-container">
        <a href="index.html" class="back-link">← Atpakaļ uz sākumlapu</a>

        <div class="header-section">
            <h2 style="color: #0c3f75; font-size: 2.5rem; margin-bottom: 10px;">Publiskā datubāze</h2>
            <p style="color: #666;">Šajā datubāzē Tu vari apskatīt pieejamās vielas un aprīkojumu</p>
        </div>

        <div class="filter-group">
            <button id="show-all" class="btn btn-outline active-filter">Rādīt visu</button>
            <button id="show-vielas" class="btn btn-outline">Rādīt vielas</button>
            <button id="show-inventars" class="btn btn-outline">Rādīt aprīkojumu</button>
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nosaukums</th>
                    <th>Tips</th>
                    <th>Apakštips</th>
                    <th>Skaits</th>
                    <th>Svars/Daudzums</th>
                    <th>Komentāri</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>

        <div class="bottom-link" style="margin-top: 30px;">
            <a href="#" style="color: #ff7f7f; text-decoration: none;">Ziņot par kļūdu</a>
        </div>
    </div>

<script>
    async function loadData() {
        try {
            const responseV = await fetch('vielas.json');
            const vielas = await responseV.json();

            const responseI = await fetch('inventars.json');
            const inventars = await responseI.json();

            const tableBody = document.getElementById('table-body');
            const buttons = document.querySelectorAll('.filter-group .btn');

            function renderTable(data) {
                tableBody.innerHTML = ''; 
                data.forEach(item => {
                    const weight = item.daudzums ? `${item.daudzums} ${item.mervienibas || ''}` : '-';
                    
                    const row = `<tr>
                        <td>${item.id}</td>
                        <td>${item.nosaukums}</td>
                        <td>${item.tips}</td>
                        <td>${item.apakstips}</td>
                        <td>${item.skaits}</td>
                        <td>${weight}</td>
                        <td>${item.komentari || ''}</td>
                    </tr>`;
                    tableBody.insertAdjacentHTML('beforeend', row);
                });
            }


            function setActiveButton(id) {
                buttons.forEach(btn => btn.classList.remove('active-filter'));
                document.getElementById(id).classList.add('active-filter');
            }

            renderTable([...vielas, ...inventars]);

            document.getElementById('show-all').addEventListener('click', () => {
                renderTable([...vielas, ...inventars]);
                setActiveButton('show-all');
            });

            document.getElementById('show-vielas').addEventListener('click', () => {
                renderTable(vielas);
                setActiveButton('show-vielas');
            });

            document.getElementById('show-inventars').addEventListener('click', () => {
                renderTable(inventars);
                setActiveButton('show-inventars');
            });

         } catch (error) {
    console.error("Datu ielādes kļūda"); 
}
            
    }

    loadData();
</script>

</body>
</html>
