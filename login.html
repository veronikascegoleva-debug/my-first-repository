<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autorizācija</title>
    <link rel="stylesheet" href="css/style.css">
</head>



<body>
    <div class="split-screen">
        <div class="left-side">
            <div class="left-content">
                <h1>Ķīmijas laboratorijas uzskaites sistēma</h1>
                <div class="line"></div>
                <p>Ķīmijas Datu Bāze</p>
                <div class="illustration">🧪</div>
            </div>
        </div>

        <div class="right-side">
            <a href="index.html" class="back-link">← Atpakaļ uz sākumlapu</a>

            <div class="right-content">
                <h2>Ieiet sistēmā</h2>
                <form class="login-form">
                    <div class="input-group" style="margin-bottom: 15px;">
                        <label style="display:block; margin-bottom:5px; color:#666;">Lietotājvārds</label>
                        <input type="text" id="username" placeholder="Lietotājvārds" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                    </div>

                    <div class="input-group" style="margin-bottom: 20px;">
                        <label style="display:block; margin-bottom:5px; color:#666;">Parole</label>
                        <input type="password" id="password" placeholder="Parole" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px;">
                    </div>

                    <button type="button" id="login-btn" class="btn btn-filled" style="width: auto; cursor: pointer;">Pieslēgties</button>
                    
                    <p id="error-msg" style="color: red; display: none; margin-top: 10px; font-size: 0.85rem;">Nepareizs lietotājvārds vai parole!</p>
                </form>

                <p style="margin-top: 20px; font-size: 0.9rem; color: #666;">
                    Neesi vēl reģistrēts? <a href="#" style="color: #007bff; text-decoration: none;">Izveidot profilu</a>
                </p>
            </div>

            <div class="bottom-link">
                <a href="#">Ziņot par kļūdu</a>
            </div>
        </div>
    </div>


    <script>
        document.getElementById('login-btn').addEventListener('click', async () => {
            const userInp = document.getElementById('username').value;
            const passInp = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const response = await fetch('users.json');
                const data = await response.json();
                
                const foundUser = data.users.find(u => u.vards === userInp && u.parole === passInp);

                if (foundUser) {
                    window.location.href = 'database.html';
                } else {
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error("Kļūda ielādējot lietotājus:", error);
                alert("Nevarēja piekļūt lietotāju datiem!");
            }
        });
    </script>
    
</body>
</html>
